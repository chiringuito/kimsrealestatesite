<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Kim Reidy Real Estate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ── INFO TILES ── */
    .contact-tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; max-width:900px; margin:0 auto; padding:48px 24px 0; }
    .contact-tile {
      background:#fff; border-radius:6px; padding:36px 24px;
      text-align:center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      opacity:0; animation: zoomIn 2s ease 0s forwards;
    }
    .contact-tile:nth-child(2) { animation-delay:0s; }
    .contact-tile:nth-child(3) { animation-delay:0s; }
    @keyframes zoomIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
    .tile-icon {
      width:72px; height:72px; background:#E22626; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 16px; font-size:26px; color:#fff;
    }
    .contact-tile h3 { font-size:17px; font-weight:700; margin-bottom:8px; color:#111; }
    .contact-tile p, .contact-tile a { font-size:15px; color:#555; text-decoration:none; }
    .contact-tile a { color:#E22626; }
    .contact-tile a:hover { color:#000; }

    /* ── FORM CARD ── */
    .contact-form-wrap { max-width:480px; margin:40px auto 0; padding:0 24px 48px; }
    .contact-form-card {
      background:#fff; border-radius:10px; padding:36px 40px;
      box-shadow:0 2px 20px rgba(0,0,0,0.08);
    }
    .contact-form-card h2 { font-size:26px; font-weight:700; text-align:center; margin-bottom:0; }
    .contact-form-card hr { border:none; border-top:1px solid #e0e0e0; margin:16px 0 24px; }
    .form-group { margin-bottom:14px; }
    .form-group input, .form-group textarea {
      width:100%; height:50px; padding:0 14px;
      background:#f2f2f2; border:1px solid #ccc; border-radius:6px;
      color:#5a5a5a; font-size:16px; font-family:inherit; box-sizing:border-box;
    }
    .form-group textarea { height:120px; padding-top:10px; resize:vertical; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .btn-submit {
      background:#E22626; color:#fff; border:1px solid #E22626;
      font-size:18px; border-radius:50px; width:100%; padding:14px 0;
      cursor:pointer; font-family:inherit; font-weight:600; margin-top:8px;
      transition:background 0.3s, border-color 0.3s;
    }
    .btn-submit:hover { background:#000; border-color:#000; }
    .form-success { display:none; color:#E22626; font-weight:600; margin-top:16px; font-size:16px; text-align:center; }

    /* ── MAP ── */
    .contact-map { width:100%; height:400px; display:block; border:none; }

    @media(max-width:700px) {
      .contact-tiles { grid-template-columns:1fr; max-width:360px; }
      .contact-form-card { padding:28px 20px; }
      .form-row { grid-template-columns:1fr; }
    }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- HERO -->
  <div class="page-hero"><h1>Contact</h1></div>

  <section style="background:var(--gray-bg); padding-bottom:48px;">

    <!-- INFO TILES -->
    <div class="contact-tiles">
      <div class="contact-tile">
        <div class="tile-icon"><i class="fas fa-map-marker-alt"></i></div>
        <h3>Address</h3>
        <p>3509 Fremont Ave N Suite 300,<br>Seattle, WA 98103</p>
      </div>
      <div class="contact-tile">
        <div class="tile-icon"><i class="fas fa-phone"></i></div>
        <h3>Phone</h3>
        <a href="tel:2065792667">(206)-579-2667</a>
      </div>
      <div class="contact-tile">
        <div class="tile-icon"><i class="fas fa-envelope"></i></div>
        <h3>Email</h3>
        <a href="mailto:kim@pointe3.com">kim@pointe3.com</a>
      </div>
    </div>

    <!-- FORM CARD -->
    <div class="contact-form-wrap">
      <div class="contact-form-card">
        <h2>Get In Touch</h2>
        <hr />
        <form method="POST" data-netlify="true" netlify-honeypot="bot-field" name="contact" id="contactForm" onsubmit="handleSubmit(event,'contactForm')">
          <input type="hidden" name="form-name" value="contact" />
          <input type="hidden" name="bot-field" />
          <div class="form-row">
            <div class="form-group"><input type="text" name="name" placeholder="Name" required /></div>
            <div class="form-group"><input type="email" name="email" placeholder="Email" required /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><input type="tel" name="phone" placeholder="Phone" /></div>
            <div class="form-group"><input type="text" name="subject" placeholder="Subject" /></div>
          </div>
          <div class="form-group"><textarea name="message" placeholder="Message"></textarea></div>
          <button type="submit" class="btn-submit">Submit</button>
          <div class="form-success" id="contactForm-success">Thanks! Kim will be in touch with you shortly.</div>
        </form>
      </div>
    </div>

  </section>

  <!-- GOOGLE MAP -->
  <iframe
    class="contact-map"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2688.946!2d-122.3499!3d47.6508!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5490150459e22df9%3A0x5e64c8b7c6e26e07!2s3509%20Fremont%20Ave%20N%20%23300%2C%20Seattle%2C%20WA%2098103!5e0!3m2!1sen!2sus!4v1"
    allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"
    title="Pointe3 Real Estate office location">
  </iframe>

  <script>
    function handleSubmit(e, formId) {
      e.preventDefault();
      const form = document.getElementById(formId);
      fetch('/', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams(new FormData(form)).toString()
      }).then(function(){ form.style.display='none'; document.getElementById(formId+'-success').style.display='block'; })
       .catch(function(){ document.getElementById(formId+'-success').style.display='block'; });
    }
  </script>
  <script src="/kimreidy-shared.js"></script>
  <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="email" name="email" /><input type="hidden" name="bot-field" />
  </form>
</body>
</html>
