<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Kim Reidy Real Estate</title>
  <meta name="description" content="Get in touch with Kim Reidy, Seattle real estate agent. Call, email, or fill out the contact form." />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .contact-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 56px; align-items: start; }
    .contact-info h2 { font-family: var(--font-serif); font-size: 26px; margin-bottom: 20px; }
    .contact-info-item { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
    .contact-info-item .icon { width: 42px; height: 42px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 15px; flex-shrink: 0; }
    .contact-info-item h4 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .contact-info-item p, .contact-info-item a { font-size: 14px; color: var(--gray-text); }
    .contact-info-item a:hover { color: var(--red); }
    .contact-form-box { background: var(--gray-bg); padding: 36px; border-radius: 6px; }
    .contact-form-box h2 { font-family: var(--font-serif); font-size: 22px; margin-bottom: 24px; }
    @media(max-width:800px){ .contact-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <div class="page-hero">
    <h1>Contact Kim</h1>
    <p>Ready to buy, sell, or relocate? Let's talk.</p>
  </div>

  <section>
    <div class="container">
      <div class="contact-grid">

        <!-- LEFT: Contact info -->
        <div class="contact-info">
          <h2>Get In Touch</h2>
          <div class="contact-info-item">
            <div class="icon"><i class="fas fa-phone"></i></div>
            <div>
              <h4>Phone</h4>
              <a href="tel:2065792667">(206)-579-2667</a>
            </div>
          </div>
          <div class="contact-info-item">
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <div>
              <h4>Email</h4>
              <a href="mailto:kim@pointe3.com">kim@pointe3.com</a>
            </div>
          </div>
          <div class="contact-info-item">
            <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
            <div>
              <h4>Office</h4>
              <p>3509 Fremont Ave N Suite 300<br>Seattle, WA 98103</p>
            </div>
          </div>
          <div class="contact-info-item">
            <div class="icon"><i class="fab fa-facebook-f"></i></div>
            <div>
              <h4>Social</h4>
              <p>
                <a href="https://www.facebook.com/KimReidyPointe3/" target="_blank">Facebook</a> &nbsp;|&nbsp;
                <a href="https://www.instagram.com/kimreidy_realestate/" target="_blank">Instagram</a> &nbsp;|&nbsp;
                <a href="https://www.linkedin.com/in/kimberlyreidy/" target="_blank">LinkedIn</a>
              </p>
            </div>
          </div>
          <br>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2688.6!2d-122.3498!3d47.6494!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDfCsDM4JzU4LjAiTiAxMjLCsDIwJzU5LjMiVw!5e0!3m2!1sen!2sus!4v1234567890"
            width="100%" height="220" style="border:0;border-radius:4px;" allowfullscreen loading="lazy"
            title="Office Location"></iframe>
        </div>

        <!-- RIGHT: Form -->
        <div class="contact-form-box">
          <h2>Send a Message</h2>
          <!-- FORMSPREE: Replace YOUR_FORM_ID with your actual Formspree form ID -->
          <!-- Sign up free at formspree.io → New Form → copy the ID from the action URL -->
          <form method="POST" data-netlify="true" netlify-honeypot="bot-field" id="contactForm" onsubmit="handleSubmit(event, 'contactForm')">
            <input type="hidden" name="form-name" value="contact" />
            <input type="hidden" name="bot-field" />
            <input type="hidden" name="_subject" value="New Contact - KimReidy.com" />
            <div class="form-row">
              <div class="form-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required />
              </div>
              <div class="form-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required />
              </div>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" required />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" name="phone" />
            </div>
            <div class="form-group">
              <label>I am interested in...</label>
              <select name="interest">
                <option value="">-- Select --</option>
                <option>Buying a home</option>
                <option>Selling a home</option>
                <option>Relocation services</option>
                <option>Renting a home</option>
                <option>General inquiry</option>
              </select>
            </div>
            <div class="form-group">
              <label>Message *</label>
              <textarea name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-red" style="width:100%">Send Message</button>
            <div class="form-success" id="contactForm-success">Thanks! Kim will be in touch with you shortly.</div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <script>
    function handleSubmit(e, formId) {
      const form = document.getElementById(formId);
      const successEl = document.getElementById(formId + '-success');
      // If Formspree ID is still placeholder, show demo success
      if (form.action.includes('YOUR_FORM_ID')) {
        e.preventDefault();
        successEl.style.display = 'block';
        form.reset();
        return;
      }
      // Otherwise let Formspree handle it — show success on return
    }
  </script>
  <script src="/kimreidy-shared.js"></script>
</body>
</html>
