<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials – Kim Reidy Real Estate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .testimonials-wrap { max-width:900px; margin:0 auto; padding:48px 24px; }
    .review-card { background:#fff; border-radius:8px; padding:28px 32px; box-shadow:0 1px 12px rgba(0,0,0,0.07); border:1px solid #efefef; margin-bottom:0; }
    .review-stars { font-size:20px; color:#E22626; margin-bottom:10px; letter-spacing:2px; }
    .review-quote-open { color:#E22626; font-size:40px; line-height:1; margin-bottom:6px; font-family:Georgia,serif; }
    .review-quote-close { color:#E22626; font-size:40px; line-height:1; margin-top:6px; font-family:Georgia,serif; }
    .review-headline { font-size:14px; color:#888; margin-bottom:8px; }
    .review-text { color:#333; font-size:15px; line-height:1.85; }
    .reviewer { display:flex; align-items:center; gap:14px; padding:16px 0 36px 4px; }
    .reviewer-avatar { width:48px; height:48px; border-radius:50%; background:#c8c8c8; display:flex; align-items:center; justify-content:center; color:#fff; font-size:22px; flex-shrink:0; }
    .reviewer-name { font-size:15px; font-weight:600; color:#111; }
    .reviewer-date { font-size:13px; color:#999; }
    .loading { text-align:center; padding:60px; color:#888; font-size:16px; }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <div class="page-hero"><h1>Testimonials</h1></div>

  <section style="background:var(--gray-bg);">
    <div class="testimonials-wrap" id="testimonialsWrap">
      <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading testimonials...</div>
    </div>
  </section>

  <script>
    // ── Fully dynamic — reads from auto-generated manifest ──────────────────
    // No hardcoded list needed. Add/remove testimonials via the CMS admin and
    // they will automatically appear or disappear after the next site deploy.

    function parseFrontmatter(text) {
      var match = text.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return {};
      var data = {};
      match[1].split('\n').forEach(function(line) {
        var idx = line.indexOf(':');
        if (idx < 0) return;
        var key = line.slice(0, idx).trim();
        var val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
        data[key] = val;
      });
      return data;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return (d.getMonth()+1).toString().padStart(2,'0') + '/' +
             d.getDate().toString().padStart(2,'0') + '/' +
             d.getFullYear();
    }

    function renderTestimonial(data) {
      var stars = '★'.repeat(parseInt(data.stars) || 5);
      var headline = data.headline ? '<div class="review-headline">' + data.headline + '</div>' : '';
      return '<div class="review-card">' +
               '<div class="review-stars">' + stars + '</div>' +
               '<div class="review-quote-open">\u201c</div>' +
               headline +
               '<div class="review-text">' + (data.quote || '') + '</div>' +
               '<div class="review-quote-close">\u201d</div>' +
             '</div>' +
             '<div class="reviewer">' +
               '<div class="reviewer-avatar"><i class="fas fa-user"></i></div>' +
               '<div>' +
                 '<div class="reviewer-name">' + (data.name || '') + '</div>' +
                 '<div class="reviewer-date">' + formatDate(data.date) + '</div>' +
               '</div>' +
             '</div>';
    }

    async function loadTestimonials() {
      var wrap = document.getElementById('testimonialsWrap');

      // Step 1: fetch the manifest generated at build time by build-manifest.js
      var slugs;
      try {
        var manifestRes = await fetch('/content/testimonial-manifest.json');
        if (!manifestRes.ok) throw new Error('manifest not found');
        slugs = await manifestRes.json();
      } catch(e) {
        wrap.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">Could not load testimonials.</p>';
        return;
      }

      if (!slugs.length) {
        wrap.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">No testimonials yet.</p>';
        return;
      }

      // Step 2: fetch every .md file listed in the manifest
      var results = [];
      for (var i = 0; i < slugs.length; i++) {
        try {
          var res = await fetch('/content/testimonials/' + slugs[i] + '.md');
          if (!res.ok) continue;
          var text = await res.text();
          var data = parseFrontmatter(text);
          if (data.name) results.push(data);
        } catch(e) { /* skip */ }
      }

      if (!results.length) {
        wrap.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">No testimonials yet.</p>';
        return;
      }

      // Step 3: sort newest first and render
      results.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
      wrap.innerHTML = results.map(renderTestimonial).join('');
    }

    loadTestimonials();
  </script>

  <script src="/kimreidy-shared.js"></script>

  <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="email" name="email" /><input type="hidden" name="bot-field" />
  </form>

</body>
</html>
