<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials – Kim Reidy Real Estate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ── RATING BANNER ── */
    .rating-banner {
      background: var(--white);
      border-bottom: 1px solid #efefef;
      padding: 36px 24px;
      text-align: center;
    }
    .rating-stars-large { font-size: 30px; color: #E22626; letter-spacing: 4px; margin-bottom: 6px; }
    .rating-score { font-size: 52px; font-weight: 700; color: #111; line-height: 1; margin-bottom: 4px; }
    .rating-count { font-size: 15px; color: #888; margin-bottom: 22px; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 10px;
      background: #fff; border: 2px solid #dadce0; color: #3c4043;
      font-size: 15px; font-weight: 600; font-family: inherit;
      padding: 12px 26px; border-radius: 50px; text-decoration: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .btn-google:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.15); border-color: #bbb; }

    /* ── GRID ── */
    .testimonials-wrap { max-width: 1140px; margin: 0 auto; padding: 48px 24px 16px; }
    .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }

    /* ── CARD ── */
    .review-card {
      background: #fff; border-radius: 10px; padding: 22px 24px 18px;
      box-shadow: 0 1px 12px rgba(0,0,0,0.07); border: 1px solid #efefef;
      display: flex; flex-direction: column;
    }
    .review-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .reviewer-avatar {
      width: 42px; height: 42px; border-radius: 50%; background: #E22626;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 17px; font-weight: 700; flex-shrink: 0;
    }
    .reviewer-name { font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; }
    .reviewer-meta { font-size: 12px; color: #999; display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .source-badge {
      background: #f1f3f4; border-radius: 4px; padding: 1px 6px;
      font-size: 11px; font-weight: 600; color: #444;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .source-badge.google { color: #4285F4; }
    .review-stars { font-size: 15px; color: #E22626; letter-spacing: 1px; margin-bottom: 10px; }
    .review-text { color: #444; font-size: 14px; line-height: 1.78; flex: 1; }
    .review-text.truncated {
      display: -webkit-box; -webkit-line-clamp: 6;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .read-more-btn {
      background: none; border: none; color: #E22626;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; padding: 8px 0 0; text-align: left;
    }

    /* ── BOTTOM CTA ── */
    .google-cta { text-align: center; padding: 40px 24px 64px; border-top: 1px solid #efefef; margin-top: 40px; }
    .google-cta p { font-size: 15px; color: #888; margin-bottom: 16px; }

    .loading { text-align:center; padding:60px; color:#888; font-size:16px; grid-column:1/-1; }

    @media (max-width: 900px) { .reviews-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .reviews-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

         target="_blank" rel="noopener" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Leave a Review on Google

    ];

    const allFiles = [...googleFiles, ...originalFiles];

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function parseFrontmatter(text) {
      const m = text.match(/^---\n([\s\S]*?)\n---/);
      if (!m) return {};
      const data = {};
      m[1].split('\n').forEach(function(line) {
        const idx = line.indexOf(':');
        if (idx < 0) return;
        const key = line.slice(0, idx).trim();
        const val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
        data[key] = val;
      });
      return data;
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return (d.getMonth()+1).toString().padStart(2,'0') + '/' +
             d.getDate().toString().padStart(2,'0') + '/' + d.getFullYear();
    }

    function renderCard(data) {
      const stars = '★'.repeat(parseInt(data.stars) || 5);
      const initial = (data.name || '?').charAt(0).toUpperCase();
      const isGoogle = data.source === 'Google';
      const badge = isGoogle
        ? '<span class="source-badge google"><i class="fab fa-google" style="font-size:10px;"></i> Google</span>'
        : '';
      const isLong = (data.quote || '').length > 380;
      const uid = 'r' + Math.random().toString(36).slice(2);
      return `
        <div class="review-card">
          <div class="review-header">
            <div class="reviewer-avatar">${initial}</div>
            <div>
              <div class="reviewer-name">${data.name || ''}</div>
              <div class="reviewer-meta"><span>${formatDate(data.date)}</span>${badge}</div>
            </div>
          </div>
          <div class="review-stars">${stars}</div>
          <div class="review-text${isLong ? ' truncated' : ''}" id="${uid}">${data.quote || ''}</div>
          ${isLong ? '<button class="read-more-btn" onclick="toggleText(this)">Read more</button>' : ''}
        </div>`;
    }

    function toggleText(btn) {
      const el = btn.previousElementSibling;
      const collapsed = el.classList.toggle('truncated');
      btn.textContent = collapsed ? 'Read more' : 'Show less';
    }

    // ── LOAD ──────────────────────────────────────────────────────────────────
    async function loadReviews() {
      const grid = document.getElementById('reviewsGrid');
      const results = [];

      // Fetch in parallel batches of 10
      for (let i = 0; i < allFiles.length; i += 10) {
        await Promise.all(allFiles.slice(i, i + 10).map(async function(file) {
          try {
            const res = await fetch('/content/testimonials/' + file + '.md');
            if (!res.ok) return;
            const data = parseFrontmatter(await res.text());
            if (data.name || data.quote) results.push(data);
          } catch(e) {}
        }));
      }

      if (!results.length) {
        grid.innerHTML = '<p style="text-align:center;color:#888;padding:40px;grid-column:1/-1;">No reviews found.</p>';
        return;
      }
      results.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
      grid.innerHTML = results.map(renderCard).join('');
    }

    loadReviews();
  </script>

</body>
