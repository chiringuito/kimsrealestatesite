name: Update Manifests

on:
  push:
    paths:
      - 'blog/_posts/**'          # blog post added/edited/deleted via CMS
      - 'content/testimonials/**' # testimonial added/edited/deleted via CMS

permissions:
  contents: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build-manifest
        run: node build-manifest.js

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog/post-manifest.json content/testimonial-manifest.json
          git diff --staged --quiet || git commit -m "Auto-update manifests [skip netlify]"
          git push
